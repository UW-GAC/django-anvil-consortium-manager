version: 2

sphinx:
  configuration: docs/conf.py

build:
  os: ubuntu-20.04
  tools:
    python: "3.12"
  jobs:
    build:
      html:
        - python -m pip install --upgrade hatch
        - mkdir -p $READTHEDOCS_OUTPUT/html/
        - hatch run docs:build
        - mv docs/_build/html/* $READTHEDOCS_OUTPUT/html/
